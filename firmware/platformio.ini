; PlatformIO project configuration
; Board: ESP32-C3 PRO MINI (ESP32-C3FH4 — RISC-V, 4MB flash, native USB)
; Docs: https://docs.platformio.org/page/projectconf.html

[env:esp32-c3]
; Pinned for reproducible builds (Arduino-ESP32 2.0.17 / ESP-IDF 4.4).
platform = espressif32@7.0.1
board = esp32-c3-devkitm-1
framework = arduino

; Stamp FIRMWARE_VERSION from git tags (fw-v*) at build time.
extra_scripts = pre:version.py

; --- Serial monitor ---
monitor_speed = 115200

; Scan into library sources so transitive framework deps (Wire.h, SPI.h, pulled
; in by Adafruit BusIO) are resolved against the Arduino core.
lib_ldf_mode = deep+

; Build the real firmware only; the diagnostic sketch is its own env (below).
build_src_filter = +<*> -<diag_scan.cpp>

; --- Native USB (USB Serial/JTAG) ---
; The C3FH4 talks to the host over its built-in USB peripheral (no separate
; USB-UART chip). These flags route Arduino's Serial over USB-CDC so that
; Serial.print() shows up in the monitor over the same cable you flash with.
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; --- Libraries ---
; ESPmDNS + WiFi are bundled with the Arduino-ESP32 core (no dep needed).
lib_deps =
    adafruit/Adafruit PWM Servo Driver Library @ ^3.0.2
    bblanchon/ArduinoJson @ ^7.2.0
    ESP32Async/AsyncTCP @ ^3.3.2
    ESP32Async/ESPAsyncWebServer @ ^3.6.0

; --- Diagnostic build: RSSI scanner (src/diag_scan.cpp) ---
; A standalone WiFi-receive test for spotting boards with a bad antenna/RF path.
; Flash with `./flash.sh diag`; flash the real firmware again with `./flash.sh -m`.
[env:diag]
extends = env:esp32-c3
build_src_filter = +<diag_scan.cpp> -<main.cpp>
